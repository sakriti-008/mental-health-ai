<!DOCTYPE html>
<html>
<head>
    <title>Mental Health AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🧠 Mental Health AI</h1>

    <form method="POST">
        <textarea name="text" placeholder="Type your feelings..."></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if prediction %}
        <div class="chat-box">
            <div class="user-msg">🧑 {{ request.form['text'] }}</div>

            <div class="bot-msg" style="border-left: 5px solid {{ color }};">
                <h3>Emotion: {{ prediction }}</h3>
                <p>💬 {{ reply }}</p>

                <div class="progress">
                    <div class="bar" style="width: {{ confidence }}%;"></div>
                </div>
                <p>Confidence: {{ confidence }}%</p>
            </div>
        </div>
    {% endif %}
</div>

</body>
</html>
